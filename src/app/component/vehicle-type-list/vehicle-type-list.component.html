<app-filters-and-search [tabTitle]="'Tipos de veiculos'" (eventSearch)="getVehicleTypeSearch($event)"></app-filters-and-search>

<nz-row class="new-type" nzJustify="end">
    <button nzSize="large" nzType="primary" nzShape="round" routerLink="/vehicle-type/form" nz-button>Novo tipo de veiculo</button>
</nz-row>

<nz-row [nzGutter]="[24, 24]" class="items">
    <nz-col nzLg="12" nzMd="24" nzSm="24" nzXs="24" *ngFor="let vehicleType of typeList" (click)="editItem(vehicleType)">
        <nz-row class="item-type-content" nzJustify="center" nzAlign="middle">
            <h3 nz-typography>
                {{ vehicleType.name }}
                <button nz-button nzSize="large">
                    <span nz-icon nzType="edit" nzTheme="outline"></span>
                    Editar
                </button>
            </h3> 
        </nz-row>
    </nz-col>
</nz-row>
